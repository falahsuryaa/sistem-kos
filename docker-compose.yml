version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kos_ciparay_db
    environment:
      POSTGRES_USER: kosuser
      POSTGRES_PASSWORD: kospassword
      POSTGRES_DB: kosciparay
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kosuser -d kosciparay"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kos_ciparay_server
    environment:
      DATABASE_URL: postgresql://kosuser:kospassword@postgres:5432/kosciparay
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: kos_ciparay_client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
